trigger:
- main

pool:
  name: 'bankafeh-self'

variables:
  - group: AWS_KEYS

stages:

- stage: Build
  displayName: 'Build Lambda & Layer'
  jobs:
  - job: BuildArtifacts
    displayName: 'Build ZIP artifacts'
         
    steps:
    - checkout: self
    
    - script: |
        echo "Creating dist directory..."
        if not exist dist mkdir dist

        echo "Installing data-core layer dependencies (pandas)..."
        python -m pip install --upgrade pip
        python -m pip install -r layers\data-core\requirements.txt -t layers\data-core\python

        echo "Installing ml-core layer dependencies (scikit-learn + joblib)..."
        python -m pip install -r layers\ml-core\requirements.txt -t layers\ml-core\python

        echo "Zipping data-core layer..."
        powershell -Command "Compress-Archive -Path layers\data-core\python\* -DestinationPath dist\data-core-layer.zip -Force"

        echo "Zipping ml-core layer..."
        powershell -Command "Compress-Archive -Path layers\ml-core\python\* -DestinationPath dist\ml-core-layer.zip -Force"

        echo "Zipping Lambda function code..."
        powershell -Command "Compress-Archive -Path src\* -DestinationPath dist\lambda-code.zip -Force"

        echo "Build artifacts created in dist\"
      displayName: 'Build lambda-code.zip and both layers'

    - task: PublishBuildArtifacts@1
      inputs:
        PathtoPublish: 'dist'
        ArtifactName: 'lambda-artifacts'
        publishLocation: 'Container'
      displayName: 'Publish ZIP artifacts'

- stage: Deploy
  displayName: 'Deploy with Terraform'
  dependsOn: Build
  jobs:
  - job: DeployInfra
    displayName: 'Terraform Plan & Apply'
   
    variables:
      TF_IN_AUTOMATION: 'true'

    steps:
    - checkout: self

    - task: DownloadBuildArtifacts@0
      inputs:
        buildType: 'current'
        downloadType: 'single'
        artifactName: 'lambda-artifacts'
        downloadPath: '$(System.DefaultWorkingDirectory)'
      displayName: 'Download build artifacts'

    - task: TerraformInstaller@0
      inputs:
        terraformVersion: 'latest'

    - script: |
        echo "Listing downloaded artifacts..."
        dir "$(System.DefaultWorkingDirectory)\lambda-artifacts"

        echo "=== TERRAFORM INIT ==="
        terraform init -upgrade -input=false

        echo "=== TERRAFORM PLAN ==="
        terraform plan -out=tfplan -input=false

        echo "=== TERRAFORM APPLY ==="
        terraform apply -auto-approve tfplan
      displayName: 'Terraform Infrastructure & Deployment'
      env:
        AWS_ACCESS_KEY_ID: $(AWS_ACCESS_KEY)
        AWS_SECRET_ACCESS_KEY: $(AWS_SECRET_KEY)
        AWS_DEFAULT_REGION: 'us-east-1'